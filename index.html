<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>2026年又松大学招生简章</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B2332;
            --primary-dark: #6B1725;
            --primary-light: #A63344;
            --gold: #D4AF37;
            --bg: #FBF9F6;
            --text: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: linear-gradient(135deg, #FBF9F6 0%, #F5F2ED 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text);
        }

        /* 头部 */
        .header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            padding: 2.5rem 1.5rem;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(139, 35, 50, 0.2);
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-30px, -20px) rotate(5deg); }
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1rem;
            letter-spacing: 0.3em;
            opacity: 0.95;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .year {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            position: relative;
            z-index: 1;
        }

        /* 主要内容区 */
        .container {
            flex: 1;
            padding: 2rem 1.5rem;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        /* 卡片按钮 */
        .card-button {
            display: block;
            background: white;
            border-radius: 20px;
            padding: 0;
            margin-bottom: 1.5rem;
            text-decoration: none;
            color: var(--text);
            box-shadow: 0 4px 20px rgba(139, 35, 50, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .card-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--primary-light));
            transition: width 0.3s ease;
        }

        .card-button:active {
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(139, 35, 50, 0.15);
        }

        .card-button:active::before {
            width: 100%;
            opacity: 0.05;
        }

        .card-content {
            padding: 2rem 2rem 2rem 2.5rem;
            position: relative;
            text-align: left;
        }

        .card-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 16px;
            font-size: 2rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 12px rgba(139, 35, 50, 0.2);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .card-desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #999;
        }

        .card-meta svg {
            width: 16px;
            height: 16px;
        }

        /* ── WSU Logo 三色主题 ── */
        /* 绿 O · 一年制硕士 */
        .card-button.green-card::before {
            background: linear-gradient(180deg, #256630, #2D8040);
        }
        .card-button.green-card .card-title { color: #256630; }
        .card-button.green-card .card-icon {
            background: linear-gradient(135deg, #256630, #2D8040);
            box-shadow: 0 4px 12px rgba(37,102,48,0.25);
        }
        .card-button.green-card:active {
            box-shadow: 0 2px 10px rgba(37,102,48,0.2);
        }

        /* 蓝 ^ · 2+X博士 */
        .card-button.blue-card::before {
            background: linear-gradient(180deg, #1B4F8C, #2462A8);
        }
        .card-button.blue-card .card-title { color: #1B4F8C; }
        .card-button.blue-card .card-icon {
            background: linear-gradient(135deg, #1B4F8C, #2462A8);
            box-shadow: 0 4px 12px rgba(27,79,140,0.25);
        }
        .card-button.blue-card:active {
            box-shadow: 0 2px 10px rgba(27,79,140,0.2);
        }

        /* 红 E · 招生简章 */
        .card-button.red-card::before {
            background: linear-gradient(180deg, var(--primary-dark), var(--primary));
        }
        .card-button.red-card .card-title { color: var(--primary); }
        .card-button.red-card .card-icon {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            box-shadow: 0 4px 12px rgba(139,35,50,0.25);
        }
        .card-button.red-card:active {
            box-shadow: 0 2px 10px rgba(139,35,50,0.2);
        }

        /* 全屏查看器 */
        .viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            overflow: hidden;
        }

        .viewer.active {
            display: flex;
            flex-direction: column;
        }

        .viewer-header {
            background: rgba(139, 35, 50, 0.95);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            flex-shrink: 0;
        }

        .viewer-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .close-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        .viewer-content {
            flex: 1;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            background: white;
            position: relative;
        }

        /* PDF iframe 样式 */
        .viewer-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* 图片查看器样式 - 适配长图手机滚动 */
        .image-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            background: #111;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            object-position: top;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: #666;
            font-size: 1rem;
            height: 100%;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(139, 35, 50, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 页脚 */
        .footer {
            background: var(--text);
            color: white;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .footer-logo {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }

        .footer-text {
            font-size: 0.85rem;
            opacity: 0.7;
            line-height: 1.8;
        }

        .footer-link {
            color: var(--gold);
            text-decoration: none;
            margin-top: 1rem;
            display: inline-block;
        }

        /* 响应式 */
        @media (max-width: 375px) {
            .logo {
                font-size: 2rem;
            }

            .card-title {
                font-size: 1.2rem;
            }

            .card-content {
                padding: 1.5rem 1.5rem 1.5rem 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <div class="logo">又松大学</div>
        <div class="subtitle">WOOSONG UNIVERSITY</div>
        <div class="year">2026 招生简章</div>
    </header>

    <!-- 主要内容 -->
    <main class="container">
        <!-- 一年制硕士项目 -->
        <button class="card-button green-card" onclick="openImage('master')">
            <div class="card-content">
                <div class="card-icon">
                    <!-- WSU Logo: 绿色 O (圆环) -->
                    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" width="38" height="38">
                        <circle cx="30" cy="30" r="21" stroke="white" stroke-width="11"/>
                    </svg>
                </div>
                <div class="card-title">一年制硕士项目</div>
                <div class="card-desc">国际联合培养 · 4个专业方向 · 快速获得学位</div>
                <div class="card-meta">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <span>点击查看简章图片</span>
                </div>
            </div>
        </button>

        <!-- 2+X博士项目 -->
        <button class="card-button blue-card" onclick="openImage('phd')">
            <div class="card-content">
                <div class="card-icon">
                    <!-- WSU Logo: 蓝色 ^ (人字形) -->
                    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" width="38" height="38">
                        <polyline points="7,46 30,14 53,46" stroke="white" stroke-width="11" stroke-linejoin="miter" stroke-linecap="square"/>
                    </svg>
                </div>
                <div class="card-title">"2+X"博士研究生项目</div>
                <div class="card-desc">灵活学制 · 5大学科方向 · 最快1.5年修完学分</div>
                <div class="card-meta">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <span>点击查看简章图片</span>
                </div>
            </div>
        </button>

        <!-- 2026年招生简章长图 -->
        <button class="card-button red-card" onclick="openImage('poster')">
            <div class="card-content">
                <div class="card-icon">
                    <!-- WSU Logo: 红色 E (方括号) -->
                    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" width="38" height="38">
                        <path d="M46,10 L16,10 L16,50 L46,50" stroke="white" stroke-width="11" stroke-linejoin="miter" stroke-linecap="square" fill="none"/>
                    </svg>
                </div>
                <div class="card-title">2026年招生简章</div>
                <div class="card-desc">完整招生信息 · 项目对比 · 一图看懂</div>
                <div class="card-meta">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <span>点击查看招生海报</span>
                </div>
            </div>
        </button>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-logo">韩国又松大学</div>
        <div class="footer-text">
            地址: 韩国大田广域市东区东大田路171<br>
            <a href="http://chinese.wsu.ac.kr" class="footer-link">chinese.wsu.ac.kr</a>
        </div>
    </footer>

    <!-- 查看器 -->
    <div id="viewer" class="viewer">
        <div class="viewer-header">
            <div class="viewer-title" id="viewerTitle">加载中...</div>
            <button class="close-btn" onclick="closeViewer()">&times;</button>
        </div>
        <div class="viewer-content" id="viewerContent">
            <div class="loading">
                <div class="spinner"></div>
                <span>正在加载...</span>
            </div>
        </div>
    </div>

    <script>
        const imageFiles = {
            master: {
                title: '一年制硕士项目简章',
                src: 'master-program.png'
            },
            phd: {
                title: '"2+X"博士研究生项目简章',
                src: 'phd-program.png'
            },
            poster: {
                title: '2026年招生简章',
                src: 'admissions-poster.png'
            }
        };

        function openImage(type) {
            const viewer = document.getElementById('viewer');
            const content = document.getElementById('viewerContent');
            const title = document.getElementById('viewerTitle');

            const file = imageFiles[type];
            title.textContent = file.title;
            viewer.classList.add('active');
            document.body.style.overflow = 'hidden';

            // 显示加载状态
            content.innerHTML = '<div class="loading"><div class="spinner"></div><span>正在加载图片...</span></div>';

            // 预加载图片后再显示
            const img = new Image();
            img.onload = () => {
                content.innerHTML = `
                    <div class="image-container">
                        <img src="${file.src}" alt="${file.title}">
                    </div>
                `;
            };
            img.onerror = () => {
                content.innerHTML = '<div class="loading"><span>图片加载失败，请稍后重试</span></div>';
            };
            img.src = file.src;
        }

        // 关闭查看器
        function closeViewer() {
            const viewer = document.getElementById('viewer');
            const content = document.getElementById('viewerContent');
            
            viewer.classList.remove('active');
            document.body.style.overflow = '';
            
            setTimeout(() => {
                content.innerHTML = '<div class="loading"><div class="spinner"></div><span>正在加载...</span></div>';
            }, 300);
        }

        // ESC键关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeViewer();
        });
    </script>
</body>
</html>
